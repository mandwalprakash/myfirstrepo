<!DOCTYPE html>
<html>
<head>
    <title>Meeting Cost Calculator</title>
</head>
<body>

<h2>Meeting Cost Calculator</h2>

<label>Number of Participants:</label>
<input type="number" id="num"><br><br>

<label>Duration (hours):</label>
<input type="number" id="duration"><br><br>

<button onclick="calculate()">Calculate</button>

<p id="result"></p>

<script>
function calculate() {
    let num = document.getElementById("num").value;
    let duration = document.getElementById("duration").value;

    let total = 0;

    for (let i = 0; i < num; i++) {
        let rate = prompt("Enter hourly rate for person " + (i+1));
        total += rate * duration;
    }

    document.getElementById("result").innerText =
        "Total Meeting Cost: ₹ " + total;
}
</script>

</body>
</html>
